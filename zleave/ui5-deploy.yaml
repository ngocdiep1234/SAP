# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zleave.zleave
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
        omitTSFromBuildResult: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://s40lp1.ucc.cit.tum.de
          client: '324'
        app:
          name: ZLEAVE_APP
          description: Leave Request Fiori App
          package: $TMP
          transport: ''
        exclude:
          - /test/
  resources:
    excludes:
      - "**/*.ts"
      - "**/*.ts.map"
      - /test/**
      - /localService/**
